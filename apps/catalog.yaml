# =============================================================================
# Deployrr Max — App Catalog
# =============================================================================
# This file is the single source of truth for all supported applications.
# The deployrr.sh TUI and the WebUI both reference this catalog.
#
# HOW TO ADD A NEW APP:
#   1. Copy an existing entry and change the values.
#   2. Pick a unique lowercase `id` (no spaces, use underscores).
#   3. Set `custom: true` if the app needs a special service block
#      (e.g., companion DB containers, non-standard env vars).
#   4. Run `media` — the new app will appear in all menus automatically.
#
# PLACEHOLDERS (replaced at deploy time):
#   {CONFIG}  → CONFIG_DIR  (default: /docker)
#   {MEDIA}   → MEDIA_DIR   (default: /mnt/media)
#   {TZ}      → TZ_VAL      (default: America/New_York)
#   {PUID}    → PUID_VAL    (default: 0)
#   {PGID}    → PGID_VAL    (default: 0)
# =============================================================================

version: "1"
meta:
  generated_by: "Deployrr Max v2.0.0"
  last_updated: "2026-03-01"
  total_apps: 110
  repo: "https://github.com/YOUR_GITHUB_USERNAME/deployrr-max"

