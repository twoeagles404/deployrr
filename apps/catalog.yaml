  # ===========================================================================
  # VPN & NETWORK
  # ===========================================================================

  - id: wireguard
    name: "WireGuard"
    image: "lscr.io/linuxserver/wireguard:latest"
    category: "VPN & Network"
    description: "Fast, modern VPN tunnel. Use as a VPN server or client."
    ports:
      - "51820:51820/udp"
    volumes:
      - "{CONFIG}/wireguard:/config"
      - "/lib/modules:/lib/modules:ro"
    environment:
      - "PUID={PUID}"
      - "PGID={PGID}"
      - "TZ={TZ}"
      - "SERVERURL=auto"
      - "PEERS=3"
      - "PEERDNS=auto"
      - "INTERNAL_SUBNET=10.13.13.0"
    privileged: true
    network_mode: "host"
    restart: "unless-stopped"

  - id: tailscale
    name: "Tailscale"
    image: "tailscale/tailscale:latest"
    category: "VPN & Network"
    description: "Zero-config mesh VPN built on WireGuard. Connect all your devices."
    ports: []
    volumes:
      - "{CONFIG}/tailscale:/var/lib"
      - "/dev/net/tun:/dev/net/tun"
    environment:
      - "TS_AUTHKEY="   # Get from tailscale.com/settings/keys
      - "TS_EXTRA_ARGS=--advertise-exit-node"
    privileged: true
    restart: "unless-stopped"
    notes: "Set TS_AUTHKEY from your Tailscale admin console before starting."

  - id: gluetun
    name: "Gluetun"
    image: "qmcgaw/gluetun:latest"
    category: "VPN & Network"
    description: "VPN client container for 20+ providers. Route other containers through it."
    ports:
      - "8888:8888"
    volumes:
      - "{CONFIG}/gluetun:/gluetun"
    environment:
      - "TZ={TZ}"
      - "VPN_SERVICE_PROVIDER=mullvad"   # Change to your provider
      - "VPN_TYPE=wireguard"
    privileged: true
    restart: "unless-stopped"
    notes: "Set VPN_SERVICE_PROVIDER and credentials before starting."

  - id: wg_easy
    name: "WG-Easy"
    image: "ghcr.io/wg-easy/wg-easy:latest"
    category: "VPN & Network"
    description: "Easiest WireGuard VPN server with a beautiful web UI for peer management."
    ports:
      - "51820:51820/udp"
      - "51821:51821"
    volumes:
      - "{CONFIG}/wg-easy:/etc/wireguard"
    environment:
      - "TZ={TZ}"
      - "WG_HOST=your_server_ip"
      - "PASSWORD=wgeasy_change_me"
    privileged: true
    restart: "unless-stopped"
    notes: "Set WG_HOST to your server's public IP or domain."

